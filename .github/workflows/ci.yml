name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            frontend/package-lock.json
      - run: npm ci
      - run: npm ci --prefix frontend
      - run: npm --prefix frontend run check:midnight-versions
      - run: npm --prefix frontend run smoke:contract
      - run: npm test
      - run: npm run build
      - run: npm run web:build
